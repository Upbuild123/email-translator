<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; padding: 4px; background: transparent; }
  button {
    width: 100%;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    font-size: 1rem;
    padding: 0.6rem 1.4rem;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  button:hover { opacity: 0.82; }
</style>
</head>
<body>
  <input type="file" accept="image/*" capture="environment" id="cam" style="display:none">
  <button onclick="document.getElementById('cam').click()">📷 Take Photo</button>
  <script>
    function sendValue(val) {
      window.parent.postMessage({ type: "streamlit:setComponentValue", value: val }, "*");
    }

    window.addEventListener("message", function(e) {
      if (e.data.type === "streamlit:render") {
        window.parent.postMessage({ type: "streamlit:setFrameHeight", height: 52 }, "*");
      }
    });

    // Tell Streamlit the component is ready
    window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");

    document.getElementById("cam").addEventListener("change", function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) { sendValue(e.target.result); };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
